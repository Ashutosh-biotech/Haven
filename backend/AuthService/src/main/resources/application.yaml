spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: AuthService
  datasource:
    url: ${POSTGRESQL_URL}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    hikari:
      max-lifetime: 60000
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8082

haven:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 2592000000