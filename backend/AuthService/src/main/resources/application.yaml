spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: AuthService
  datasource:
    url: ${POSTGRESQL_URL}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    hikari:
      max-lifetime: 60000
      idle-timeout: 30000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8082

app:
  security:
    keystore-location: ${KEY_LOCATION}
    keystore-password: ${JWT_PASSWORD}
    key-alias: ${KEY_ALIAS}
    key-password: ${JWT_PASSWORD}