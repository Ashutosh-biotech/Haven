spring:
  application:
    name: Haven-Gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                          allowedOrigins: "http://localhost:3000"
                          allowedMethods:
                            - GET
                            - POST
                            - PUT
                            - DELETE
                            - OPTIONS
                          allowedHeaders: "*"
                          allowCredentials: true
                          maxAge: 3600
          routes:
            - id: hotel-service
              uri: http://localhost:8081/
              predicates:
                - Path=/api/hotels/**

server:
  port: 8080
